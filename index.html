  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: linear-gradient(135deg, #0a0f1e 0%, #0d1529 60%, #0a1020 100%); font-family: 'Inter', 'Segoe UI', sans-serif; color: #e2e8f0; overflow-x: hidden; }

    /* HEADER */
    #header { border-bottom: 1px solid rgba(6,182,212,0.15); background: rgba(6,182,212,0.03); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 10; }
    .header-inner { max-width: 900px; margin: 0 auto; padding: 0 24px; }
    .header-top { display: flex; align-items: center; gap: 12px; padding: 14px 0 0; flex-wrap: wrap; }
    .logo { width: 50px; height: 50px; border-radius: 10px; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .logo img { width: 100%; height: 100%; object-fit: cover; }
    .header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: #f1f5f9; }
    .header-sub { font-size: 11px; color: #64748b; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

    /* WORLD CLOCKS */
    .world-clock { display:flex; align-items:center; gap:8px; padding:6px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02); }
    .wc-flag { font-size:16px; }
    .wc-time { font-size:14px; font-weight:800; font-variant-numeric:tabular-nums; color:#e2e8f0; }
    .wc-label { font-size:9px; color:#475569; text-transform:uppercase; letter-spacing:0.06em; margin-top:1px; }
    .wc-session { border-color:rgba(16,185,129,0.3); background:rgba(16,185,129,0.06); }
    .wc-session .wc-time { color:#10b981; }

    /* SESSION COUNTDOWN BOX (in checklist) */
    .session-box { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .sess-card { flex:1; min-width:140px; padding:14px 18px; border-radius:10px; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02); }
    .sess-card.active { border-color:rgba(16,185,129,0.4); background:rgba(16,185,129,0.06); }
    .sess-card.warning { border-color:rgba(245,158,11,0.4); background:rgba(245,158,11,0.06); animation:pulse-border 1.5s infinite; }
    .sess-card.ended { border-color:rgba(244,63,94,0.3); background:rgba(244,63,94,0.04); opacity:0.6; }
    .sess-card.upcoming { border-color:rgba(168,85,247,0.3); background:rgba(168,85,247,0.04); }
    .sess-name { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#64748b; margin-bottom:6px; }
    .sess-time { font-size:22px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1; }
    .sess-time.green { color:#10b981; }
    .sess-time.orange { color:#f59e0b; }
    .sess-time.red { color:#f43f5e; }
    .sess-time.purple { color:#a78bfa; }
    .sess-time.gray { color:#334155; }
    .sess-sub { font-size:11px; color:#475569; margin-top:4px; }

    /* SWEEPER SELECTOR */
    .sweeper-btn { display:flex; align-items:center; gap:8px; padding:10px 20px; border-radius:10px; font-size:13px; font-weight:700; border:1.5px solid #1e293b; background:rgba(255,255,255,0.02); color:#475569; cursor:pointer; transition:all 0.2s; }
    .sweeper-btn:hover { border-color:#334155; color:#94a3b8; }
    .sweeper-btn.active-dxy { border-color:rgba(6,182,212,0.5); background:rgba(6,182,212,0.08); color:#06b6d4; }
    .sweeper-btn.active-eurusd { border-color:rgba(16,185,129,0.5); background:rgba(16,185,129,0.08); color:#10b981; }
    .sweeper-btn.active-same { border-color:rgba(251,191,36,0.5); background:rgba(251,191,36,0.08); color:#fbbf24; }

    /* MODE TOGGLE */
    .mode-toggle { display:flex; align-items:center; gap:0; border-radius:10px; overflow:hidden; border:1px solid #1e293b; margin-left:auto; }
    .mode-btn { padding:8px 16px; font-size:12px; font-weight:800; letter-spacing:0.05em; border:none; cursor:pointer; transition:all 0.2s; background:transparent; color:#475569; }
    .mode-btn.active-bt { background:linear-gradient(135deg,#8b5cf6,#6d28d9); color:#fff; }
    .mode-btn.active-real { background:linear-gradient(135deg,#f59e0b,#d97706); color:#0a0f1e; }
    .mode-tag { font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; letter-spacing:0.06em; }
    .mode-tag-bt { background:rgba(139,92,246,0.15); color:#8b5cf6; border:1px solid rgba(139,92,246,0.3); }
    .mode-tag-real { background:rgba(245,158,11,0.15); color:#f59e0b; border:1px solid rgba(245,158,11,0.3); }

    /* CLOCK */
    .clock-wrap { display:flex; align-items:center; gap:8px; padding:6px 14px; border-radius:20px; transition:all 0.5s; }
    .clock-time { font-size:15px; font-weight:800; font-variant-numeric:tabular-nums; }
    .clock-label { font-size:10px; color:#64748b; }
    .clock-green { border:1px solid rgba(16,185,129,0.4); background:rgba(16,185,129,0.08); }
    .clock-green .clock-time { color:#10b981; }
    .clock-orange { border:1px solid rgba(245,158,11,0.4); background:rgba(245,158,11,0.08); animation:pulse-border 1.5s infinite; }
    .clock-orange .clock-time { color:#f59e0b; }
    .clock-orange .clock-label { color:#f59e0b; }
    .clock-red { border:1px solid rgba(244,63,94,0.5); background:rgba(244,63,94,0.1); animation:pulse-border 0.8s infinite; }
    .clock-red .clock-time { color:#f43f5e; }
    .clock-red .clock-label { color:#f43f5e; }
    @keyframes pulse-border { 0%,100%{opacity:1} 50%{opacity:0.6} }

    /* TIMER BADGE */
    #timer-badge { display:none; align-items:center; gap:8px; padding:6px 14px; border-radius:20px; }
    .badge-dot { width:7px; height:7px; border-radius:50%; animation:blink 1s infinite; }
    #expired-badge { display:none; padding:6px 14px; border-radius:20px; border:1px solid rgba(244,63,94,0.4); background:rgba(244,63,94,0.1); font-size:12px; font-weight:700; color:#f43f5e; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* TABS */
    .tabs { display:flex; gap:0; margin-top:12px; }
    .tab-btn { padding:10px 20px; font-size:14px; font-weight:600; letter-spacing:0.02em; background:transparent; border:none; border-bottom:2px solid transparent; color:#64748b; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .tab-btn:hover { color:#e2e8f0; }
    .tab-btn.active { border-bottom-color:#06b6d4; color:#06b6d4; }
    .tab-badge { margin-left:6px; border-radius:10px; font-size:10px; font-weight:700; padding:1px 6px; display:inline-block; vertical-align:middle; }

    /* CONTENT */
    .content { max-width:900px; margin:0 auto; padding:32px 24px; }
    .page { display:none; }
    .page.active { display:block; }
    #page-position, #page-stats, #page-journal { padding: 0 20px 24px; box-sizing: border-box; }
    .page-title { font-size:22px; font-weight:700; color:#f1f5f9; margin-bottom:4px; }
    .page-sub { font-size:13px; color:#64748b; margin-bottom:28px; }

    /* SESSION WARNING BANNER */
    #session-warning { display:none; margin-bottom:20px; padding:12px 18px; border-radius:10px; font-size:13px; font-weight:600; align-items:center; gap:10px; }
    .sw-orange { background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.3); color:#f59e0b; }
    .sw-red { background:rgba(244,63,94,0.08); border:1px solid rgba(244,63,94,0.3); color:#f43f5e; }

    /* CHECKLIST */
    .checklist { display:flex; flex-direction:column; gap:14px; }
    .check-item { border-radius:12px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); overflow:hidden; transition:all 0.2s; }
    .check-item.checked { border-color:rgba(6,182,212,0.4); background:linear-gradient(90deg,rgba(6,182,212,0.08),rgba(59,130,246,0.04)); }
    .check-item.locked { opacity:0.4; }
    .check-item.expired-item { border-color:rgba(244,63,94,0.4); background:rgba(244,63,94,0.05); }
    .check-item.aplus { border-color:rgba(168,85,247,0.5) !important; background:linear-gradient(90deg,rgba(168,85,247,0.1),rgba(59,130,246,0.05)) !important; }
    .check-item.golden { border-color:rgba(251,191,36,0.5) !important; background:linear-gradient(90deg,rgba(251,191,36,0.08),rgba(245,158,11,0.04)) !important; }
    .check-row { display:flex; align-items:center; gap:18px; padding:20px 24px; cursor:pointer; user-select:none; }
    .check-row.no-click { cursor:default; }
    .check-row.locked-cursor { cursor:not-allowed; }
    .checkbox { width:26px; height:26px; border-radius:6px; flex-shrink:0; border:2px solid #334155; background:transparent; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
    .checkbox.checked { border-color:#06b6d4; background:linear-gradient(135deg,#06b6d4,#3b82f6); }
    .checkbox.expired { border-color:#f43f5e; }
    .checkmark { display:none; }
    .checkbox.checked .checkmark { display:block; }
    .checkbox.expired .expired-x { display:block; font-size:12px; color:#f43f5e; }
    .expired-x { display:none; }
    .check-text { flex:1; }
    .check-num { font-size:11px; font-weight:700; color:#475569; margin-right:8px; letter-spacing:0.05em; }
    .check-num.active-num { color:#06b6d4; }
    .check-label { font-size:14px; font-weight:600; color:#94a3b8; }
    .check-label.checked-label { color:#e2e8f0; }
    .check-label.expired-label { color:#f43f5e; }
    .check-desc { font-size:12px; color:#475569; margin-top:3px; }
    .lock-icon { font-size:16px; color:#334155; }
    .timer-inline { display:none; flex-direction:column; align-items:flex-end; gap:2px; }
    .timer-inline.visible { display:flex; }
    #timer-display { font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1; }
    .timer-sub { font-size:10px; color:#475569; }

    /* OB APLUS PANEL */
    .fvg-panel { padding:0 24px 18px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .aplus-check { display:flex; align-items:center; gap:10px; padding:10px 16px; border-radius:8px; border:1px solid rgba(168,85,247,0.25); background:rgba(168,85,247,0.06); cursor:pointer; user-select:none; transition:all 0.2s; flex:1; min-width:200px; }
    .aplus-check:hover { border-color:rgba(168,85,247,0.5); }
    .aplus-check.active { border-color:rgba(168,85,247,0.6); background:rgba(168,85,247,0.12); }
    .aplus-box { width:20px; height:20px; border-radius:5px; border:2px solid #6d28d9; background:transparent; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; }
    .aplus-box.checked { background:linear-gradient(135deg,#8b5cf6,#6d28d9); border-color:#8b5cf6; }
    .aplus-text { font-size:13px; font-weight:600; color:#94a3b8; }
    .aplus-text.active { color:#c4b5fd; }
    .aplus-badge { font-size:11px; font-weight:800; padding:2px 8px; border-radius:10px; background:rgba(168,85,247,0.2); color:#a78bfa; border:1px solid rgba(168,85,247,0.3); margin-left:auto; white-space:nowrap; }

    /* DXY PANEL */
    .dxy-panel { padding:16px 24px; border-top:1px solid rgba(6,182,212,0.08); background:rgba(6,182,212,0.02); display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .dxy-panel.expired-panel { border-top-color:rgba(244,63,94,0.15); }
    .field-label { font-size:11px; font-weight:600; color:#475569; text-transform:uppercase; letter-spacing:0.07em; margin-bottom:6px; }
    .timer-progress { flex:1; min-width:160px; }
    .progress-header { display:flex; justify-content:space-between; margin-bottom:6px; }
    .progress-label { font-size:11px; color:#475569; }
    #progress-pct { font-size:11px; font-weight:700; }
    .progress-track { height:6px; border-radius:3px; background:#1e293b; overflow:hidden; }
    #progress-fill { height:100%; border-radius:3px; width:100%; transition:width 1s linear, background 0.5s; background:#10b981; }
    .dxy-actions { display:flex; gap:8px; margin-left:auto; }
    #expired-msg { display:none; width:100%; padding:10px 14px; border-radius:8px; background:rgba(244,63,94,0.07); border:1px solid rgba(244,63,94,0.18); font-size:12px; color:#f43f5e; font-weight:600; margin-top:4px; }

    /* BUTTONS */
    .btn { padding:9px 18px; border-radius:8px; font-weight:700; font-size:13px; border:none; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
    .btn-primary { background:linear-gradient(135deg,#06b6d4,#3b82f6); color:#0a0f1e; }
    .btn-primary:disabled { background:#1e293b; color:#475569; cursor:not-allowed; }
    .btn-ghost { background:transparent; border:1px solid #334155; color:#64748b; }
    .btn-submit { width:100%; padding:14px 0; border-radius:10px; font-weight:800; font-size:15px; border:none; cursor:pointer; letter-spacing:0.02em; background:linear-gradient(135deg,#06b6d4,#3b82f6); color:#0a0f1e; transition:all 0.2s; margin-top:20px; }
    .btn-submit.saved { background:linear-gradient(135deg,#10b981,#059669); }

    /* SETUP VALID */
    #setup-valid { display:none; margin-top:24px; padding:16px 24px; border-radius:12px; background:linear-gradient(90deg,rgba(6,182,212,0.12),rgba(59,130,246,0.08)); border:1px solid rgba(6,182,212,0.3); align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
    #setup-valid.visible { display:flex; }
    #aplus-label { display:none; font-size:12px; color:#a78bfa; font-weight:700; }
    #aplus-label.visible { display:block; }

    /* FORM */
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .field { margin-bottom:0; }
    .input { width:100%; padding:10px 14px; border-radius:8px; border:1px solid #1e293b; background:rgba(255,255,255,0.03); color:#e2e8f0; font-size:14px; outline:none; font-family:inherit; }
    .input:focus { border-color:rgba(6,182,212,0.4); }
    select.input { color:#e2e8f0; background:#0f172a; }
    select.input option, select.input optgroup { background:#1e293b; color:#e2e8f0; font-weight:500; }
    textarea.input { resize:vertical; }
    .toggle-group { display:flex; gap:8px; }
    .toggle-btn { flex:1; padding:10px 0; border-radius:8px; font-weight:700; font-size:13px; border:1.5px solid #1e293b; background:rgba(255,255,255,0.02); color:#475569; cursor:pointer; transition:all 0.15s; }
    .toggle-btn.active-long { border-color:#10b981; background:rgba(16,185,129,0.12); color:#10b981; }
    .toggle-btn.active-short { border-color:#f43f5e; background:rgba(244,63,94,0.12); color:#f43f5e; }
    .toggle-btn.active-win { border-color:#10b981; background:rgba(16,185,129,0.12); color:#10b981; }
    .toggle-btn.active-loss { border-color:#f43f5e; background:rgba(244,63,94,0.12); color:#f43f5e; }
    .toggle-btn.active-be { border-color:#f59e0b; background:rgba(245,158,11,0.12); color:#f59e0b; }
    .rr-display { width:100%; padding:10px 14px; border-radius:8px; border:1px solid #1e293b; background:rgba(255,255,255,0.03); font-size:14px; font-weight:700; color:#334155; min-height:42px; display:flex; align-items:center; }
    .rr-display.has-value { color:#06b6d4; }
    .full-width { grid-column:1/-1; }
    .mt-14 { margin-top:14px; }

    /* STATS */
    .stat-grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:14px; }
    .stat-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .stat-card { padding:18px 20px; border-radius:10px; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02); }
    .stat-label { font-size:11px; color:#475569; text-transform:uppercase; letter-spacing:0.07em; margin-bottom:6px; }
    .stat-value { font-size:28px; font-weight:800; letter-spacing:-0.5px; }
    .chart-box { margin-top:20px; padding:20px 24px; border-radius:12px; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02); }
    .chart-title { font-size:12px; font-weight:600; color:#64748b; margin-bottom:14px; text-transform:uppercase; letter-spacing:0.08em; }
    .bar-row { margin-bottom:10px; }
    .bar-header { display:flex; justify-content:space-between; margin-bottom:4px; }
    .bar-track { height:6px; border-radius:3px; background:#1e293b; }
    .bar-fill { height:100%; border-radius:3px; transition:width 0.5s ease; }
    .aplus-stat { margin-top:14px; padding:16px 20px; border-radius:10px; border:1px solid rgba(168,85,247,0.25); background:rgba(168,85,247,0.05); display:flex; align-items:center; justify-content:space-between; }

    /* JOURNAL */
    .trade-list { display:grid; grid-template-columns:1fr 1fr; gap:10px; align-items:start; }
    @media (max-width:760px) { .trade-list { grid-template-columns:1fr; } }
    .trade-card { padding:16px 20px; border-radius:10px; display:grid; grid-template-columns:auto 1fr auto auto auto; gap:12px; align-items:center; }
    .edit-btn { background:transparent; border:1px solid #1e293b; color:#475569; cursor:pointer; font-size:14px; padding:5px 10px; border-radius:6px; transition:all 0.15s; font-weight:600; }
    .edit-btn:hover { border-color:#06b6d4; color:#06b6d4; background:rgba(6,182,212,0.08); }
    .result-badge { padding:4px 10px; border-radius:6px; font-weight:800; font-size:12px; }
    .trade-main { font-size:13px; font-weight:600; color:#e2e8f0; }
    .trade-meta { font-size:11px; color:#475569; margin-top:2px; }
    .trade-notes { font-size:11px; color:#64748b; margin-top:4px; font-style:italic; }
    .delete-btn { background:transparent; border:1px solid #1e293b; color:#475569; cursor:pointer; font-size:14px; padding:5px 10px; border-radius:6px; transition:all 0.15s; font-weight:600; }
    .delete-btn:hover { border-color:#f43f5e; color:#f43f5e; background:rgba(244,63,94,0.08); }

    /* JOURNAL FILTERS */
    .journal-filters { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
    .filter-btn { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; border:1px solid #1e293b; background:transparent; color:#64748b; cursor:pointer; transition:all 0.15s; }
    .filter-btn.active { background:#1e293b; color:#e2e8f0; border-color:#334155; }

    /* RISK BUTTONS */
    .risk-btn { padding:6px 14px; border-radius:7px; border:1.5px solid #1e293b; background:rgba(255,255,255,0.02); color:#475569; font-size:12px; font-weight:700; cursor:pointer; transition:all 0.15s; }
    .risk-btn:hover { border-color:#334155; color:#94a3b8; }
    .risk-btn.active { border-color:#10b981; background:rgba(16,185,129,0.12); color:#10b981; }

    /* SL PIPS BUTTONS */
    .sl-pip-btn { min-width:38px; height:34px; padding:0 8px; border-radius:8px; border:1.5px solid #1e293b; background:rgba(255,255,255,0.02); color:#475569; font-size:12px; font-weight:700; cursor:pointer; transition:all 0.15s; }
    .sl-pip-btn:hover { border-color:#334155; color:#94a3b8; }
    .sl-pip-btn.active { border-color:#f43f5e; background:rgba(244,63,94,0.12); color:#f43f5e; }

    /* CALENDAR */
    .cal-weekdays { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:4px; }
    .cal-weekdays div { font-size:10px; font-weight:600; color:#475569; text-align:center; text-transform:uppercase; letter-spacing:0.05em; padding:2px 0; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); grid-auto-rows:48px; gap:2px; }
    .cal-day { height:48px; border-radius:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:all 0.15s; border:1px solid transparent; position:relative; }
    .cal-day:hover { border-color:rgba(255,255,255,0.15); }
    .cal-day.empty { cursor:default; }
    .cal-day.today { border-color:rgba(6,182,212,0.5); }
    .cal-day.win  { background:rgba(16,185,129,0.15); border-color:rgba(16,185,129,0.3); }
    .cal-day.loss { background:rgba(244,63,94,0.12); border-color:rgba(244,63,94,0.25); }
    .cal-day.mixed { background:rgba(245,158,11,0.1); border-color:rgba(245,158,11,0.25); }
    .cal-day.be   { background:rgba(100,116,139,0.1); border-color:rgba(100,116,139,0.2); }
    .cal-day .cal-num { font-size:12px; font-weight:700; color:#94a3b8; }
    .cal-day.win .cal-num  { color:#10b981; }
    .cal-day.loss .cal-num { color:#f43f5e; }
    .cal-day.mixed .cal-num { color:#f59e0b; }
    .cal-day .cal-dot { font-size:8px; margin-top:2px; }
    .cal-day .cal-pnl { font-size:clamp(8px, 2.4vw, 14px); font-weight:800; margin-top:1px; line-height:1; white-space:nowrap; }
    .cal-day.selected { box-shadow:0 0 0 2px #06b6d4; }

    /* EMPTY */
    .empty { text-align:center; padding:60px 0; color:#334155; font-size:14px; }
    .empty-icon { font-size:40px; margin-bottom:12px; }

    /* NO TRADE REASON BUTTONS */
    .notrade-reason-btn { padding:10px 14px; border-radius:8px; border:1.5px solid #1e293b; background:rgba(255,255,255,0.02); color:#94a3b8; font-size:13px; font-weight:600; cursor:pointer; text-align:left; transition:all 0.15s; }
    .notrade-reason-btn:hover { border-color:#334155; }
    .notrade-reason-btn.selected { border-color:#64748b; background:rgba(100,116,139,0.15); color:#e2e8f0; }

    /* CANDLE PATTERN CARDS */
    .candle-card { display:flex; flex-direction:column; align-items:center; gap:5px; padding:8px 4px; border-radius:8px; cursor:pointer; transition:all 0.18s; position:relative; }
    .candle-card:hover { transform:scale(1.05); }
    .candle-card.bull { background:rgba(16,185,129,0.06); border:1px solid rgba(16,185,129,0.2); }
    .candle-card.bear { background:rgba(244,63,94,0.06); border:1px solid rgba(244,63,94,0.2); }
    .candle-card.bull.selected { background:rgba(16,185,129,0.22); border:2px solid #10b981; box-shadow:0 0 12px rgba(16,185,129,0.25); }
    .candle-card.bear.selected { background:rgba(244,63,94,0.22); border:2px solid #f43f5e; box-shadow:0 0 12px rgba(244,63,94,0.25); }
    .candle-card .selected-check { display:none; position:absolute; top:3px; right:4px; font-size:10px; }
    .candle-card.selected .selected-check { display:block; }

    /* EMOTIONAL CHECKLIST */
    .emo-q { padding:12px 14px; border-radius:8px; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02); }
    .emo-q.answered-ok { border-color:rgba(16,185,129,0.3); background:rgba(16,185,129,0.04); }
    .emo-q.answered-warn { border-color:rgba(245,158,11,0.3); background:rgba(245,158,11,0.04); }
    .emo-btn { flex:1; padding:8px 0; border-radius:7px; border:1.5px solid #1e293b; background:rgba(255,255,255,0.02); color:#94a3b8; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; }
    .emo-btn:hover { border-color:#334155; }
    .emo-btn.selected-ok { border-color:#10b981; background:rgba(16,185,129,0.15); color:#10b981; }
    .emo-btn.selected-warn { border-color:#f59e0b; background:rgba(245,158,11,0.15); color:#f59e0b; }

    /* CONFIRM DIALOG */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center; }
    .overlay.visible { display:flex; }
    .dialog { background:#0d1529; border:1px solid rgba(244,63,94,0.3); border-radius:14px; padding:28px; max-width:360px; width:90%; text-align:center; }
    .dialog-title { font-size:16px; font-weight:700; color:#f1f5f9; margin-bottom:8px; }
    .dialog-sub { font-size:13px; color:#64748b; margin-bottom:24px; }
    .dialog-btns { display:flex; gap:10px; }
    .btn-danger { flex:1; padding:11px 0; border-radius:8px; background:rgba(244,63,94,0.15); border:1px solid rgba(244,63,94,0.4); color:#f43f5e; font-weight:700; font-size:14px; cursor:pointer; }
    .btn-cancel { flex:1; padding:11px 0; border-radius:8px; background:transparent; border:1px solid #334155; color:#64748b; font-weight:700; font-size:14px; cursor:pointer; }

    @media (max-width:600px) {
      .form-grid { grid-template-columns:1fr; }
      .stat-grid-3 { grid-template-columns:1fr 1fr; }
      .tabs { overflow-x:auto; }
      .tab-btn { padding:10px 12px; font-size:12px; }
      .header-top { gap:8px; }
      .mode-btn { padding:6px 10px; font-size:11px; }
    }
  </style>
</head>
